name: Update Chocolatey Packages

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    env:
      "api_key": ${{ secrets.CHOCO_API_KEY }}
      "gist_id": ${{ secrets.GIST_ID }}
      "gist_id_test": ${{ secrets.GIST_ID_TEST }}
      "github_user_repo": ${{ secrets.GH_USER_REPO }}
      "github_api_key": ${{ secrets.GH_API_KEY }}
      "au_Push": ${{ secrets.AU_PUSH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Chocolatey Profile
        run: |
          .\setup\chocoProfile.ps1

      - name: setup au
        run: |
          .\setup\au_setup.ps1

      - name: Run update.ps1 in each automatic/* subdirectory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location "$env:GITHUB_WORKSPACE/automatic"

          Get-ChildItem -Directory | ForEach-Object {
            $updateScript = Join-Path $_.FullName 'update.ps1'
            if (Test-Path $updateScript) {
              Write-Host "Running: $updateScript"
              & $updateScript
            } else {
              Write-Host "Skipping $($_.Name): no update.ps1"
            }
          }

      - name: Push chocolatey packages
        run: |
          choco push (Get-ChildItem -Filter "*.nupkg").FullName --source https://push.chocolatey.org/ --api-key=$env:api_key

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update Chocolatey packages" || echo "No changes to commit"
          git push origin main
