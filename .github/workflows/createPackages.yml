name: Update Chocolatey Packages

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    env:
      "api_key": ${{ secrets.CHOCO_API_KEY }}
      "gist_id": ${{ secrets.GIST_ID }}
      "gist_id_test": ${{ secrets.GIST_ID_TEST }}
      "github_user_repo": ${{ secrets.GH_USER_REPO }}
      "github_api_key": ${{ secrets.GH_API_KEY }}
      "au_Push": ${{ secrets.AU_PUSH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Chocolatey Profile
        run: |
          .\setup\chocoProfile.ps1

      - name: setup au
        run: |
          .\setup\au_setup.ps1

      - name: Run update.ps1 in each automatic/* subdirectory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-Location "$env:GITHUB_WORKSPACE/automatic"

          Get-ChildItem -Directory | ForEach-Object {
            $updateScript = Join-Path $_.FullName 'update.ps1'
            if (Test-Path $updateScript) {
              Write-Host "Running: $updateScript"
              & $updateScript
            } else {
              Write-Host "Skipping $($_.Name): no update.ps1"
            }
          }

      - name: Push chocolatey packages
        run: |
          foreach ($file in Get-ChildItem -Filter "*.nupkg" -Recurse) {
              choco push $file.FullName --source https://push.chocolatey.org/ --api-key=$env:api_key
          }

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          token: ${{ secrets.GH_API_KEY }}
          commit-message: "Update Chocolatey packages"
          title: "Update Chocolatey packages"
          body: "This PR updates the Chocolatey packages with the latest versions."
